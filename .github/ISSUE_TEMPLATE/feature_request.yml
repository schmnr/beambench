name: Feature request
description: Propose an improvement to Beam Bench
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem before the solution. For large changes, maintainers may ask for a smaller design discussion before implementation begins.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for the same request.
          required: true
        - label: I have described the user problem this would solve.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to accomplish, and what is difficult today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed experience
      description: Describe how you think the feature should work from a user's perspective.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Explain current workarounds or other approaches you considered.

  - type: textarea
    id: safety
    attributes:
      label: Hardware or safety considerations
      description: Note whether this affects machine motion, laser output, controller communication, job planning, or project compatibility.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, mockups, screenshots, or links that clarify the request.
