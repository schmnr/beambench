# Builds the Linux AppImage and attaches it to a GitHub Release.
#
# Trigger:
#   "Run workflow" button on the GitHub Actions page.
#
# Pushing v* tags intentionally does not auto-release. Keep releases deliberate
# so GitHub Actions minutes are not spent by accident.
#
# Output:
#   - A workflow artifact containing the .AppImage and .sig files.
#   - Optionally attaches the .AppImage and .sig to the GitHub Release when the
#     "Attach to GitHub Release" input is checked.
#
name: Release Linux

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.1)."
        required: true
        type: string
      attach_to_release:
        description: "Attach Linux artifacts to the GitHub Release."
        required: false
        default: false
        type: boolean

concurrency:
  # Serialize expensive same-tag builds and release uploads. The shared asset
  # uploader also enumerates drafts explicitly because GitHub's release-by-tag
  # endpoint excludes them.
  # NOTE: a concurrency group holds at most ONE pending run. Dispatch the three
  # platform workflows one at a time, waiting for each to finish; dispatching
  # all three together cancels the queued run (see docs/releasing.md).
  group: beambench-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build-linux:
    name: Build Linux AppImage
    # Pinned to the oldest supported runner on purpose: the AppImage links
    # the build host's glibc, so building on ubuntu-latest (24.04, glibc
    # 2.39) produced binaries that refuse to start on Debian 12 (2.36) and
    # Ubuntu 22.04 LTS (2.35). Building on 22.04 sets the floor at glibc
    # 2.35. Do not bump back to ubuntu-latest without deciding to drop
    # those users.
    runs-on: ubuntu-22.04
    permissions:
      contents: write   # needed to create / update the GitHub Release
    steps:
      - name: Resolve release tag
        id: tag
        env:
          RELEASE_TAG_INPUT: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG_INPUT"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid release tag: $tag"
            exit 1
          fi
          echo "value=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.value }}

      - name: Validate required secrets
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          missing=0
          for name in \
            TAURI_SIGNING_PRIVATE_KEY \
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required repository secret: ${name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libudev-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            file \
            wget

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tauri-app/package-lock.json

      - name: Install frontend dependencies
        working-directory: tauri-app
        run: npm ci

      - name: Build and verify x64 CLI
        run: |
          set -euo pipefail

          version="${{ steps.tag.outputs.version }}"
          target="x86_64-unknown-linux-gnu"
          cli_dir="$GITHUB_WORKSPACE/target/release-staging/cli/$version/$target"
          archive="$cli_dir/Beam.Bench.CLI_${version}_${target}.tar.gz"
          checksum="${archive}.sha256"

          node tauri-app/scripts/build-cli-release.mjs \
            --target "$target" \
            --version "$version" \
            --out-dir "$cli_dir"

          rm -f "$archive" "$checksum"
          tar -C "$cli_dir" -czf "$archive" \
            beambench-cli \
            LICENSE \
            COPYRIGHT \
            SOURCE.md \
            THIRD_PARTY_NOTICES.md \
            THIRD_PARTY_LICENSES.md

          verify_dir="$RUNNER_TEMP/beambench-cli-verify"
          rm -rf "$verify_dir"
          mkdir -p "$verify_dir"
          tar -C "$verify_dir" -xzf "$archive"
          node tauri-app/scripts/build-cli-release.mjs \
            --target "$target" \
            --version "$version" \
            --out-dir "$verify_dir" \
            --verify-only

          (
            cd "$cli_dir"
            sha256sum "$(basename "$archive")" > "$(basename "$checksum")"
            sha256sum -c "$(basename "$checksum")"
          )

      - name: Build AppImage
        working-directory: tauri-app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --bundles appimage

      - name: Locate AppImage
        id: locate
        run: |
          set -euo pipefail
          appimage=$(find target/release/bundle/appimage -name '*.AppImage' -type f | head -n 1)
          if [ -z "$appimage" ]; then
            echo "No AppImage produced." >&2
            exit 1
          fi
          signature="${appimage}.sig"
          if [ ! -f "$signature" ]; then
            echo "No Tauri updater signature produced for the Linux AppImage." >&2
            exit 1
          fi
          echo "Found: $appimage"
          echo "Found: $signature"
          version="${{ steps.tag.outputs.version }}"
          cli_dir="$GITHUB_WORKSPACE/target/release-staging/cli/$version/x86_64-unknown-linux-gnu"
          cli_archive="$cli_dir/Beam.Bench.CLI_${version}_x86_64-unknown-linux-gnu.tar.gz"
          if [ ! -f "$cli_archive" ]; then
            echo "No standalone CLI archive produced." >&2
            exit 1
          fi
          cli_checksum="${cli_archive}.sha256"
          if [ ! -f "$cli_checksum" ]; then
            echo "No standalone CLI checksum produced." >&2
            exit 1
          fi
          echo "Found: $cli_archive"
          echo "Found: $cli_checksum"
          echo "path=$appimage" >> "$GITHUB_OUTPUT"
          echo "signature=$signature" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$appimage")" >> "$GITHUB_OUTPUT"
          {
            echo "files<<EOF"
            printf '%s\n' "$appimage" "$signature" "$cli_archive" "$cli_checksum"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload AppImage as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeamBench-Linux-${{ steps.tag.outputs.value }}
          path: ${{ steps.locate.outputs.files }}
          retention-days: 30

      - name: Attach AppImage to GitHub Release
        if: ${{ inputs.attach_to_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.value }}
          RELEASE_FILES: ${{ steps.locate.outputs.files }}
        run: |
          set -euo pipefail
          arguments=()
          while IFS= read -r artifact; do
            if [ -n "$artifact" ]; then
              arguments+=(--file "$artifact")
            fi
          done <<< "$RELEASE_FILES"
          node tauri-app/scripts/upload-release-assets.mjs \
            --tag "$RELEASE_TAG" \
            "${arguments[@]}"
