# Builds the signed, notarized macOS app and attaches it to a GitHub Release.
#
# Fallback workflow. The normal macOS release path is
# scripts/release-macos-local.
#
# Trigger:
#   1. Set the repository variable ALLOW_GITHUB_MACOS_RELEASE=true.
#   2. Use the "Run workflow" button on the GitHub Actions page.
#   3. Delete or reset the variable immediately after the fallback run.
#
# Pushing v* tags intentionally does not auto-release. If the variable is
# absent or false, the job is skipped before a runner is allocated.

name: Release macOS

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.1)."
        required: true
        type: string

concurrency:
  # Serialize expensive same-tag builds and release uploads. The shared asset
  # uploader also enumerates drafts explicitly because GitHub's release-by-tag
  # endpoint excludes them.
  # NOTE: a concurrency group holds at most ONE pending run. Dispatch the three
  # platform workflows one at a time, waiting for each to finish; dispatching
  # all three together cancels the queued run (see docs/releasing.md).
  group: beambench-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build-macos:
    # A manual dispatch alone does not allocate a runner. This fallback must be
    # enabled explicitly for the release window.
    if: ${{ vars.ALLOW_GITHUB_MACOS_RELEASE == 'true' }}
    name: Build signed and notarized macOS app
    runs-on: macos-15-intel
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: tag
        env:
          RELEASE_TAG_INPUT: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="$RELEASE_TAG_INPUT"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid release tag: $tag"
            exit 1
          fi
          echo "value=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.value }}

      - name: Validate required secrets
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          missing=0
          for name in \
            APPLE_API_ISSUER \
            APPLE_API_KEY \
            APPLE_API_KEY_P8_BASE64 \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_TEAM_ID \
            TAURI_SIGNING_PRIVATE_KEY \
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required repository secret: ${name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-macos-${{ hashFiles('**/Cargo.lock') }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tauri-app/package-lock.json

      - name: Install frontend dependencies
        working-directory: tauri-app
        run: npm ci

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          decode_base64() {
            if base64 --decode </dev/null >/dev/null 2>&1; then
              base64 --decode
            else
              base64 -D
            fi
          }

          certificate_path="$RUNNER_TEMP/apple-developer-id.p12"
          keychain_path="$RUNNER_TEMP/beam-bench-signing.keychain-db"
          keychain_password="$(openssl rand -base64 32)"

          printf '%s' "$APPLE_CERTIFICATE" | decode_base64 > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -f pkcs12 \
            -k "$keychain_path" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild \
            -T /usr/bin/xcrun
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

          echo "KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail

          decode_base64() {
            if base64 --decode </dev/null >/dev/null 2>&1; then
              base64 --decode
            else
              base64 -D
            fi
          }

          private_keys_dir="$RUNNER_TEMP/private_keys"
          api_key_path="$private_keys_dir/AuthKey_${APPLE_API_KEY}.p8"

          mkdir -p "$private_keys_dir"
          printf '%s' "$APPLE_API_KEY_P8_BASE64" | decode_base64 > "$api_key_path"
          chmod 600 "$api_key_path"

          echo "APPLE_API_KEY_PATH=$api_key_path" >> "$GITHUB_ENV"

      - name: Build, sign, and notarize universal CLI
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail

          version="${{ steps.tag.outputs.version }}"
          target="universal-apple-darwin"
          cli_dir="target/release-staging/cli/$version/$target"
          cli="$cli_dir/beambench-cli"
          archive="$cli_dir/Beam.Bench.CLI_${version}_${target}.zip"
          checksum="${archive}.sha256"

          node tauri-app/scripts/build-cli-release.mjs \
            --target "$target" \
            --version "$version" \
            --out-dir "$cli_dir"

          codesign \
            --force \
            --timestamp \
            --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$cli"
          codesign --verify --strict --verbose=2 "$cli"

          rm -f "$archive" "$checksum"
          (
            cd "$cli_dir"
            zip -9 "$(basename "$archive")" \
              beambench-cli \
              LICENSE \
              COPYRIGHT \
              SOURCE.md \
              THIRD_PARTY_NOTICES.md \
              THIRD_PARTY_LICENSES.md
          )
          xcrun notarytool submit "$archive" \
            --key "$APPLE_API_KEY_PATH" \
            --key-id "$APPLE_API_KEY" \
            --issuer "$APPLE_API_ISSUER" \
            --wait

          verify_dir="$RUNNER_TEMP/beambench-cli-verify"
          rm -rf "$verify_dir"
          mkdir -p "$verify_dir"
          ditto -x -k "$archive" "$verify_dir"
          node tauri-app/scripts/build-cli-release.mjs \
            --target "$target" \
            --version "$version" \
            --out-dir "$verify_dir" \
            --verify-only
          codesign --verify --strict --verbose=2 "$verify_dir/beambench-cli"
          # Do not run spctl against the raw CLI. macOS 15 denies a valid,
          # notarized standalone executable as "not an app". The accepted
          # notarytool submission, strict code-signature check, architecture
          # check, and executed version check above cover the CLI artifact.

          (
            cd "$cli_dir"
            shasum -a 256 "$(basename "$archive")" > "$(basename "$checksum")"
            shasum -a 256 -c "$(basename "$checksum")"
          )

      - name: Build signed and notarized universal macOS app
        working-directory: tauri-app
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CI: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target universal-apple-darwin

      - name: Verify signed app camera entitlement
        run: |
          set -euo pipefail

          app="$(find target -type d -name 'Beam Bench.app' -print -quit)"
          if [ -z "$app" ]; then
            echo "::error::Beam Bench.app was not produced."
            exit 1
          fi

          entitlements="$RUNNER_TEMP/beam-bench-entitlements.plist"
          /usr/bin/codesign -d --entitlements :- "$app" >"$entitlements" 2>/dev/null
          if [ "$(/usr/libexec/PlistBuddy -c 'Print :com.apple.security.device.camera' "$entitlements" 2>/dev/null || true)" != "true" ]; then
            echo "::error::Signed app is missing com.apple.security.device.camera."
            exit 1
          fi

      - name: Notarize, staple, and verify DMGs
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail

          dmgs=()
          while IFS= read -r -d '' dmg; do
            dmgs+=("$dmg")
          done < <(find target -type f -name '*.dmg' -print0)

          if [ "${#dmgs[@]}" -eq 0 ]; then
            echo "::error::No DMG produced."
            exit 1
          fi

          for dmg in "${dmgs[@]}"; do
            xcrun notarytool submit "$dmg" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY" \
              --issuer "$APPLE_API_ISSUER" \
              --wait
            xcrun stapler staple "$dmg"
            xcrun stapler validate "$dmg"
            spctl -a -vvv -t install "$dmg"
          done

          if ! find target -type f -name '*.app.tar.gz.sig' | grep -q .; then
            echo "::error::No Tauri updater signature produced for the macOS app archive."
            exit 1
          fi

      - name: Locate macOS artifacts
        id: locate
        run: |
          set -euo pipefail

          version="${{ steps.tag.outputs.version }}"
          cli_dir="target/release-staging/cli/$version/universal-apple-darwin"
          cli_archive="$cli_dir/Beam.Bench.CLI_${version}_universal-apple-darwin.zip"
          cli_checksum="${cli_archive}.sha256"
          if [ ! -s "$cli_archive" ] || [ ! -s "$cli_checksum" ]; then
            echo "::error::Verified standalone CLI archive or checksum is missing."
            exit 1
          fi

          artifacts=()
          while IFS= read -r -d '' artifact; do
            artifacts+=("$artifact")
          done < <(
            find target -type f \( \
              -name '*.dmg' -o \
              -name '*.app.tar.gz' -o \
              -name '*.app.tar.gz.sig' \
            \) -print0
          )
          artifacts+=("$cli_archive" "$cli_checksum")

          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "::error::No macOS release artifacts produced."
            exit 1
          fi

          printf 'Found macOS artifacts:\n'
          printf '  %s\n' "${artifacts[@]}"

          {
            echo "files<<EOF"
            printf '%s\n' "${artifacts[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BeamBench-macOS-${{ steps.tag.outputs.value }}
          path: ${{ steps.locate.outputs.files }}
          retention-days: 30

      - name: Attach macOS artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.value }}
          RELEASE_FILES: ${{ steps.locate.outputs.files }}
        run: |
          set -euo pipefail
          arguments=()
          while IFS= read -r artifact; do
            if [ -n "$artifact" ]; then
              arguments+=(--file "$artifact")
            fi
          done <<< "$RELEASE_FILES"
          node tauri-app/scripts/upload-release-assets.mjs \
            --tag "$RELEASE_TAG" \
            "${arguments[@]}"

      - name: Delete temporary keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
